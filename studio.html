<!--
RK MASTER STUDIO - COMPLETE OFFLINE DESKTOP MASTERING SUITE
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>RK MASTER STUDIO - VINTAGE HARDWARE DESIGN</title>
<style>
    body { background: #0a0a0c; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 25px; text-align: center; margin: 0; }
    .header-title { color: #ff9900; font-size: 26px; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; text-shadow: 0 0 15px rgba(255,153,0,0.4); }
    .rack { border: 2px solid #2d2d30; padding: 25px; margin: 20px auto; width: 92%; max-width: 900px; background: #141416; border-radius: 8px; box-shadow: 0 15px 35px #000000; }
    h2 { color: #00ffcc; font-size: 16px; text-transform: uppercase; margin-top: 0; text-align: left; border-bottom: 1px solid #252528; padding-bottom: 8px; letter-spacing: 1px; }
    
    .distrokid-panel { display: flex; justify-content: space-between; background: #0b0b0d; border: 1px solid #ff9900; padding: 15px; margin-bottom: 20px; border-radius: 6px; text-align: left; box-shadow: inset 0 0 10px #000; }
    .meta-box { display: flex; flex-direction: column; width: 31%; }
    .meta-box label { font-size: 11px; color: #ff9900; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .meta-box select { background: #1a1a1f; color: #fff; border: 1px solid #3a3a3f; padding: 8px; font-family: monospace; font-size: 12px; border-radius: 4px; outline: none; }

    .player-panel { background: #070709; padding: 15px; border-radius: 6px; border: 1px solid #222225; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    input[type="file"] { background: #1a1a1f; color: #00ffcc; border: 1px solid #3a3a3f; padding: 10px; font-size: 13px; width: 45%; font-family: monospace; cursor: pointer; border-radius: 4px; }
    audio { width: 50%; }
    
    .controls { display: flex; justify-content: space-between; padding: 20px; background: #08080a; border-radius: 8px; border: 1px solid #1c1c1f; box-shadow: inset 0 0 15px #000; }
    .eq-band { display: flex; flex-direction: column; align-items: center; width: 12%; }
    .eq-band input[type=range] { -webkit-appearance: slider-vertical; width: 12px; height: 160px; background: #1a1a1f; border-radius: 6px; outline: none; margin: 12px 0; cursor: pointer; }
    .freq-label { font-size: 13px; color: #ff9900; font-weight: bold; }
    .value-display { font-size: 11px; color: #00ffcc; background: #000; padding: 2px 6px; border-radius: 3px; font-family: monospace; min-width: 35px; display: inline-block; text-align: center; border: 1px solid #222; }
    
    .special-fx { display: flex; justify-content: space-around; margin-top: 20px; background: #08080a; padding: 15px; border-radius: 6px; border: 1px solid #1c1c1f; }
    .fx-box { display: flex; flex-direction: column; align-items: center; width: 45%; font-size: 12px; font-weight: bold; color: #ff9900; text-transform: uppercase; letter-spacing: 1px; }
    .fx-box input[type=range] { -webkit-appearance: none; width: 90%; background: #1a1a1f; height: 8px; border-radius: 4px; outline: none; margin-top: 10px; cursor: pointer; }
    .fx-box input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #00ffcc; border-radius: 50%; cursor: pointer; }

    .export-panel { text-align: right; margin-top: 20px; padding-top: 15px; border-top: 1px solid #252528; }
    .btn { background: #ff9900; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; font-family: monospace; border-radius: 4px; margin-left: 12px; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
    .btn-mp3 { background: #00ffcc; }
    .btn:hover { opacity: 0.9; }
</style>
</head>
<body>

    <div class="header-title">RK MASTER STUDIO • DISTROKID COMPLIANT EQ</div>

    <div class="rack">
        <h2>Console Unit A</h2>
        
        <div class="distrokid-panel">
            <div class="meta-box">
                <label>Lyrics Language</label>
                <select id="meta-lang"><option>Hindi</option><option>English</option><option>Punjabi</option></select>
            </div>
            <div class="meta-box">
                <label>Primary Genre</label>
                <select id="meta-genre-1">
                    <option>Pop</option><option>Jazz</option><option>New Age</option>
                    <option>Hip Hop/Rap</option><option>Rock</option><option>Metal</option>
                    <option>World</option><option>Dance</option><option>Alternative</option>
                </select>
            </div>
            <div class="meta-box">
                <label>Secondary Genre</label>
                <select id="meta-genre-2">
                    <option>None</option><option>Pop</option><option>Jazz</option>
                    <option>Dance</option><option>New Age</option><option>Alternative</option>
                </select>
            </div>
        </div>

        <div class="player-panel">
            <input type="file" id="file-a" accept="audio/wav, audio/mp3, audio/m4a">
            <audio id="audio-a" controls></audio>
        </div>

        <div class="controls">
            <div class="eq-band"><span class="freq-label">60Hz</span><input type="range" id="a-60" min="-12" max="12" value="0" oninput="updateEQ('a',60)"><span id="v-a-60" class="value-display">0dB</span></div>
            <div class="eq-band"><span class="freq-label">150Hz</span><input type="range" id="a-150" min="-12" max="12" value="0" oninput="updateEQ('a',150)"><span id="v-a-150" class="value-display">0dB</span></div>
            <div class="eq-band"><span class="freq-label">400Hz</span><input type="range" id="a-400" min="-12" max="12" value="0" oninput="updateEQ('a',400)"><span id="v-a-400" class="value-display">0dB</span></div>
            <div class="eq-band"><span class="freq-label">1.0k</span><input type="range" id="a-1k" min="-12" max="12" value="0" oninput="updateEQ('a','1k')"><span id="v-a-1k" class="value-display">0dB</span></div>
            <div class="eq-band"><span class="freq-label">2.5k</span><input type="range" id="a-2k" min="-12" max="12" value="0" oninput="updateEQ('a','2k')"><span id="v-a-2k" class="value-display">0dB</span></div>
            <div class="eq-band"><span class="freq-label">6.0k</span><input type="range" id="a-6k" min="-12" max="12" value="0" oninput="updateEQ('a','6k')"><span id="v-a-6k" class="value-display">0dB</span></div>
            <div class="eq-band"><span class="freq-label">15k</span><input type="range" id="a-15k" min="-12" max="12" value="0" oninput="updateEQ('a','15k')"><span id="v-a-15k" class="value-display">0dB</span></div>
        </div>

        <div class="special-fx">
            <div class="fx-box">Super Bass (Low Weight) <input type="range" id="a-sb" min="0" max="12" value="0" oninput="updateEQ('a','sb')"></div>
            <div class="fx-box">Punch Beats (Kick Drive) <input type="range" id="a-pb" min="0" max="12" value="0" oninput="updateEQ('a','pb')"></div>
        </div>

        <div class="export-panel">
            <button class="btn" onclick="exportMaster('WAV')">Export Master WAV</button>
            <button class="btn btn-mp3" onclick="exportMaster('MP3')">Export Master MP3</button>
        </div>
    </div>

<script>
    var audioCtx = null;
    var filters = {};
    var mediaRecorder = null;
    var recordedChunks = [];
    var streamDest = null;

    function updateEQ(rack, freq) {
        var slider = document.getElementById(rack + '-' + freq);
        var display = document.getElementById('v-' + rack + '-' + freq);
        if(display) display.innerText = (slider.value > 0 ? '+' : '') + slider.value + 'dB';
        
        if (filters[rack + '-' + freq]) {
            filters[rack + '-' + freq].gain.value = parseFloat(slider.value);
        }
    }

    document.getElementById('file-a').onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        
        var audio = document.getElementById('audio-a');
        audio.src = URL.createObjectURL(file);
        
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            var source = audioCtx.createMediaElementSource(audio);
            var lastNode = source;
            
            var bands = {'60':60, '150':150, '400':400, '1k':1000, '2k':2500, '6k':6000, '15k':15000};
            for(var b in bands) {
                var f = audioCtx.createBiquadFilter();
                f.type = 'peaking';
                f.frequency.value = bands[b];
                f.gain.value = 0;
                filters['a-' + b] = f;
                lastNode.connect(f);
                lastNode = f;
            }
            
            var sb = audioCtx.createBiquadFilter();
            sb.type = 'lowshelf';
            sb.frequency.value = 80;
            sb.gain.value = 0;
            filters['a-sb'] = sb;
            lastNode.connect(sb);
            lastNode = sb;

            var pb = audioCtx.createBiquadFilter();
            pb.type = 'peaking';
            pb.frequency.value = 110;
            pb.Q.value = 2.5;
            pb.gain.value = 0;
            filters['a-pb'] = pb;
            lastNode.connect(pb);
            lastNode = pb;

            streamDest = audioCtx.createMediaStreamDestination();
            lastNode.connect(streamDest);
            lastNode.connect(audioCtx.destination);

            mediaRecorder = new MediaRecorder(streamDest.stream);
            mediaRecorder.ondataavailable = function(evt) {
                if (evt.data.size > 0) recordedChunks.push(evt.data);
            };
        }
    };

    document.getElementById('audio-a').onplay = function() {
        if(audioCtx && audioCtx.state === 'suspended') { audioCtx.resume(); }
